name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit arrives on the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege: default to read-only.
permissions:
  contents: read

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required by release-please (Sprint 20 / P8) later

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build

      - name: Check formatting
        run: npm run format:check

  # Explicit status check that always exists, even if the matrix changes. Used
  # as the single required-status-check in branch protection (see
  # docs/BRANCH_PROTECTION.md).
  ci-complete:
    name: CI complete
    runs-on: ubuntu-latest
    needs: [verify]
    if: always()
    steps:
      - name: Succeed only if all required jobs succeeded
        run: |
          if [ "${{ needs.verify.result }}" != "success" ]; then
            echo "verify job did not succeed: ${{ needs.verify.result }}"
            exit 1
          fi
