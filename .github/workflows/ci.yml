name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit arrives on the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege: default to read-only.
permissions:
  contents: read

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required by release-please (Sprint 20 / P8) later

      # SEC-001 guard — fails the PR if any .env file appears in the index.
      # The check runs before setup-node so a violation fails in seconds.
      # See docs/SEC-001-env-in-git.md.
      - name: Verify no .env file is tracked
        run: |
          TRACKED=$(git ls-files '.env' '.env.local' '.env.production' '.env.staging' 2>/dev/null || true)
          if [ -n "$TRACKED" ]; then
            echo "::error::The following .env files are tracked in git (see docs/SEC-001-env-in-git.md):"
            echo "$TRACKED" | sed 's/^/  - /'
            echo "::error::Only .env.example may be committed. Run 'git rm --cached <file>' and recommit."
            exit 1
          fi
          echo "OK — no real .env files tracked."

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build

      - name: Check formatting
        run: npm run format:check

  # Explicit status check that always exists, even if the matrix changes. Used
  # as the single required-status-check in branch protection (see
  # docs/BRANCH_PROTECTION.md).
  ci-complete:
    name: CI complete
    runs-on: ubuntu-latest
    needs: [verify]
    if: always()
    steps:
      - name: Succeed only if all required jobs succeeded
        run: |
          if [ "${{ needs.verify.result }}" != "success" ]; then
            echo "verify job did not succeed: ${{ needs.verify.result }}"
            exit 1
          fi
