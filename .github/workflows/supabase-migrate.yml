name: Supabase Migrations

# Applies migrations to staging automatically on push to main (migration files only).
# Production gate is manual — requires explicit workflow_dispatch.
#
# Required GitHub secrets (set in repo Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN       — from supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD        — database password for prod project
#   SUPABASE_STAGING_PROJECT_REF — ref of the staging project (see docs/ENVIRONMENTS.md)
#   SUPABASE_PROD_PROJECT_REF   — tvwicdlxljqijoikioln (already set)
#
# The check-prereqs job guards all downstream jobs: if SUPABASE_ACCESS_TOKEN or
# SUPABASE_STAGING_PROJECT_REF are not configured, the workflow exits cleanly with
# a notice rather than failing. This keeps CI green during S14.1 provisioning.
#
# See docs/ENTERPRISE_ROADMAP.md §Platform P3 and docs/SPRINT_14_OWNER_ACTIONS.md §S14.4.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: supabase-migrate-${{ github.ref }}
  cancel-in-progress: false # Never cancel a running migration

permissions:
  contents: read

jobs:
  # ── Prereqs check ──────────────────────────────────────────────────────────
  # Checks whether the required secrets are configured. Downstream jobs depend
  # on this job's outputs to skip gracefully when secrets are missing.
  check-prereqs:
    name: Check secrets configured
    runs-on: ubuntu-latest
    outputs:
      staging-ready: ${{ steps.check.outputs.staging-ready }}
    steps:
      - name: Check staging credentials
        id: check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_STAGING_PROJECT_REF" ]; then
            echo "staging-ready=true" >> "$GITHUB_OUTPUT"
            echo "✅ Staging credentials configured — migration will proceed."
          else
            echo "staging-ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Staging credentials not yet configured (SUPABASE_ACCESS_TOKEN or SUPABASE_STAGING_PROJECT_REF missing)."
            echo "::notice::Set these secrets at github.com/DHauversburk/vector/settings/secrets/actions"
            echo "::notice::See docs/SPRINT_14_OWNER_ACTIONS.md §S14.1 for instructions."
          fi

  # ── Migrate staging ────────────────────────────────────────────────────────
  migrate-staging:
    name: Migrate staging
    runs-on: ubuntu-latest
    needs: check-prereqs
    # Skip gracefully when secrets are not yet provisioned (S14.1 pending)
    if: |
      needs.check-prereqs.outputs.staging-ready == 'true' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'))
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Apply migrations to staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push \
            --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }} \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Verify migration state
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase migration list \
            --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}

  # ── Migrate production (manual gate) ──────────────────────────────────────
  migrate-production:
    name: Migrate production (manual gate)
    runs-on: ubuntu-latest
    # Only runs when explicitly triggered with environment=production
    if: |
      github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    environment: production # Requires manual approval in GitHub Environments
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Apply migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Applying migrations to PRODUCTION project ${{ secrets.SUPABASE_PROD_PROJECT_REF }}"
          supabase db push \
            --project-ref ${{ secrets.SUPABASE_PROD_PROJECT_REF }} \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Verify migration state
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase migration list \
            --project-ref ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
