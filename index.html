<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="VECTOR - Secure, Anonymous Clinical Scheduling System for high-compliance environments requiring Zero-Trust architecture."
    />
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />

    <!-- Google Fonts: Inter (UI) + JetBrains Mono (Tokens/Code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- CSP is enforced via vercel.json response headers (production).
         A meta http-equiv CSP is intentionally omitted here — it would
         block Vite's eval-based source maps in dev/preview mode and
         break the E2E test harness. See docs/ENVIRONMENTS.md §CSP. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a1628" />
    <title>VECTOR | Secure Clinical Scheduling</title>

    <!-- Critical runtime error handler — must load before main bundle.
         External file so CSP allows it under script-src 'self'. -->
    <script src="/error-handler.js"></script>

    <!-- Skip-link styles — inline here so they work before Tailwind loads -->
    <style>
      .skip-link {
        position: absolute;
        top: -100%;
        left: 50%;
        transform: translateX(-50%);
        background: #3b82f6;
        color: #fff;
        padding: 12px 24px;
        border-radius: 0 0 8px 8px;
        font-weight: bold;
        text-decoration: none;
        z-index: 10000;
        transition: top 0.2s ease;
        font-family: system-ui, sans-serif;
        white-space: nowrap;
      }
      /* CSS-only show-on-focus — no inline JS event handlers needed */
      .skip-link:focus,
      .skip-link:focus-visible {
        top: 0;
        outline: 3px solid #fff;
        outline-offset: 2px;
      }
      /* Pre-render shell while React boots */
      #root-shell {
        background-color: #0f172a;
        color: #475569;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: sans-serif;
      }
    </style>
  </head>

  <body>
    <!-- Skip Navigation for Keyboard Users (WCAG 2.1 A) -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Pre-render shell: replaced by React root once the bundle boots.
         No inline scripts or event handlers — CSP-safe. -->
    <div id="root">
      <div id="root-shell">
        <div style="text-align: center">
          <h1 style="color: #3b82f6">VECTOR</h1>
          <p>System Initializing...</p>
          <small style="color: #334155"
            >If this persists, the application runtime has failed.</small
          >
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
