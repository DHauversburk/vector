# supabase/config.toml — Supabase project configuration
#
# Generated by: supabase init (then manually tailored for project VECTOR)
# Project ref:  tvwicdlxljqijoikioln
# Docs:         docs/ENTERPRISE_ROADMAP.md §Platform P3
#
# OWNER ACTION REQUIRED (S14.4):
#   1. Run: supabase login
#   2. Run: supabase link --project-ref tvwicdlxljqijoikioln
#   3. Run: supabase db dump --schema public --linked > supabase/migrations/0001_baseline_schema.sql
#   4. Run: supabase db dump --schema public --linked --role-only > supabase/migrations/0002_rls_policies.sql
#   5. Run: supabase db dump --schema public --linked --use-copy > supabase/migrations/0003_rpc_functions.sql
#      ⚠ Manually audit each RPC definition for SET search_path guard before committing.
#   6. Commit the migration files, open a PR, and merge.
#
# See docs/SPRINT_14_KICKOFF.md §S14.4 for full checklist.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["https://vector-health.vercel.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.external.anonymous_users]
enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions]
# Import map shared across all edge functions
# import_map = "./functions/import_map.json"

[analytics]
enabled = false
port = 54327
backend = "postgres"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
